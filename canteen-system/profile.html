<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
        }
        
        .header {
            background: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .back-btn {
            font-size: 26px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: #f0f2f5;
        }
        
        .header h1 {
            font-size: 19px;
            flex: 1;
        }
        
        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 20px 16px;
            border-radius: 32px;
            padding: 28px 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            color: white;
        }
        
        .avatar {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .user-info-card h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .user-info-card p {
            font-size: 13px;
            opacity: 0.85;
        }
        
        .section {
            background: white;
            margin: 12px 16px;
            border-radius: 24px;
            overflow: hidden;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .menu-item:active {
            background: #f8f9fa;
        }
        
        .menu-icon {
            font-size: 22px;
            width: 36px;
        }
        
        .menu-text {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }
        
        .menu-arrow {
            color: #ccc;
            font-size: 18px;
        }
        
        .logout-btn {
            background: white;
            margin: 20px 16px;
            border-radius: 30px;
            padding: 16px;
            text-align: center;
            color: #f5576c;
            font-weight: 600;
            cursor: pointer;
        }
        
        .logout-btn:active {
            background: #f8f9fa;
        }
        
        .version {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">←</div>
        <h1>个人中心</h1>
        <div style="width: 40px;"></div>
    </div>
    
    <div id="profileContent"></div>
    
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        if (!currentUser) {
            window.location.href = 'login.html';
        }
        
        function renderProfile() {
            let html = `
                <div class="profile-card">
                    <div class="avatar">👨‍🎓</div>
                    <div class="user-info-card">
                        <h3>${currentUser.real_name || currentUser.username}</h3>
                        <p>学号: ${currentUser.student_id || '未绑定'}</p>
                        <p>📞 ${currentUser.phone || '未填写'}</p>
                    </div>
                </div>
                
                <div class="section">
                    <div class="menu-item" onclick="location.href='orders.html'">
                        <div class="menu-icon">📋</div>
                        <div class="menu-text">我的订单</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="location.href='messages.html'">
                        <div class="menu-icon">🔔</div>
                        <div class="menu-text">消息通知</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item">
                        <div class="menu-icon">📞</div>
                        <div class="menu-text">联系客服</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item">
                        <div class="menu-icon">⭐</div>
                        <div class="menu-text">意见反馈</div>
                        <div class="menu-arrow">›</div>
                    </div>
                </div>
                
                <div class="logout-btn" onclick="logout()">退出登录</div>
                <div class="version">高校食堂在线订餐系统 v1.0</div>
            `;
            document.getElementById('profileContent').innerHTML = html;
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('cart');
                window.location.href = 'login.html';
            }
        }
        
        renderProfile();
    </script>
</body>
</html>
